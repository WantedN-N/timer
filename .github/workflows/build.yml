name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## 발표 타이머 ${{ github.ref_name }}

            ### 다운로드
            - **Windows**: `발표 타이머 Setup *.exe`
            - **Mac**: `발표 타이머-*.dmg`

            ### Mac 설치 방법
            > Apple 공식 서명이 없어 Gatekeeper 경고가 뜰 수 있어요.
            1. DMG 파일 다운로드
            2. 터미널에서 아래 명령어 실행:
            ```
            xattr -rd com.apple.quarantine ~/Downloads/발표\ 타이머-*.dmg
            ```
            3. DMG 열어서 설치
